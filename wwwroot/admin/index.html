<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; padding: 20px; }
        h1 { margin-bottom: 20px; color: #fff; }

        .form-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        input { background: #2a2a2a; border: 1px solid #444; color: #e0e0e0; padding: 8px 12px; border-radius: 4px; font-size: 14px; font-family: inherit; }
        input:focus { outline: none; border-color: #646cff; }
        input::placeholder { color: #666; }
        .form-row input { flex: 1; min-width: 150px; }

        button { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn-add { background: #22c55e; color: #fff; }
        .btn-add:hover { background: #16a34a; }
        .btn-cancel { background: #555; color: #fff; }
        .btn-cancel:hover { background: #666; }

        table { width: 100%; border-collapse: collapse; background: #1a1a1a; border-radius: 8px; overflow: hidden; }
        th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #333; }
        th { background: #252525; color: #aaa; font-weight: 600; font-size: 13px; text-transform: uppercase; }
        th.sortable { cursor: pointer; user-select: none; }
        th.sortable:hover { color: #e0e0e0; }
        th .sort-ind { color: #646cff; font-size: 11px; margin-left: 4px; }
        td { font-size: 14px; }
        .btn-delete { background: #ef4444; color: #fff; padding: 4px 12px; font-size: 13px; }
        .btn-delete:hover { background: #dc2626; }
        .btn-edit { background: #3b82f6; color: #fff; padding: 4px 12px; font-size: 13px; }
        .btn-edit:hover { background: #2563eb; }
        .actions { display: flex; gap: 6px; }

        .section-header { display: flex; align-items: center; justify-content: space-between; margin-top: 40px; margin-bottom: 15px; }
        .section-header h1 { margin: 0; }

        .status { padding: 10px; border-radius: 4px; margin-bottom: 15px; display: none; }
        .status.success { display: block; background: #052e16; color: #4ade80; border: 1px solid #166534; }
        .status.error { display: block; background: #2c0b0e; color: #f87171; border: 1px solid #7f1d1d; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 24px; width: 100%; max-width: 480px; }
        .modal h2 { color: #fff; margin-bottom: 16px; font-size: 1.2rem; }
        .modal input, .modal select { width: 100%; margin-bottom: 10px; }
        .modal select { background: #2a2a2a; border: 1px solid #444; color: #e0e0e0; padding: 8px 12px; border-radius: 4px; font-size: 14px; }
        .modal select:focus { outline: none; border-color: #646cff; }
        .modal select[multiple] { height: 120px; }
        .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
        .modal label { color: #aaa; font-size: 13px; margin-bottom: 4px; display: block; }
    </style>
</head>
<body>
    <h1>Admin Panel</h1>

    <div id="status" class="status"></div>

    <div class="section-header">
        <h1>Cars</h1>
        <button class="btn-add" onclick="openCarModal()">+ Add Car</button>
    </div>
    <table>
        <thead id="cars-thead">
            <tr>
                <th class="sortable" data-field="id" onclick="toggleCarSort('id')">ID<span class="sort-ind"></span></th>
                <th class="sortable" data-field="brand" onclick="toggleCarSort('brand')">Brand<span class="sort-ind"></span></th>
                <th class="sortable" data-field="model" onclick="toggleCarSort('model')">Model<span class="sort-ind"></span></th>
                <th class="sortable" data-field="year" onclick="toggleCarSort('year')">Year<span class="sort-ind"></span></th>
                <th class="sortable" data-field="price" onclick="toggleCarSort('price')">Price<span class="sort-ind"></span></th>
                <th class="sortable" data-field="dealerCount" onclick="toggleCarSort('dealerCount')">Dealers<span class="sort-ind"></span></th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="cars-table"></tbody>
    </table>

    <div class="section-header">
        <h1>Dealers</h1>
    </div>
    <div class="form-row" style="margin-bottom:15px;">
        <input type="text" id="filter-brand" placeholder="Filter by brand" oninput="loadDealers()">
        <input type="text" id="filter-city" placeholder="Filter by city" oninput="loadDealers()">
    </div>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Brand</th>
                <th>City</th>
                <th>Phone</th>
                <th>Cars</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="dealers-table"></tbody>
    </table>

    <div class="modal-overlay" id="dealer-modal">
        <div class="modal">
            <h2 id="dealer-modal-title">Edit Dealer</h2>
            <input type="hidden" id="dealer-edit-id">
            <input type="text" id="dealer-name" placeholder="Name">
            <input type="text" id="dealer-brand" placeholder="Brand">
            <input type="text" id="dealer-city" placeholder="City">
            <input type="text" id="dealer-phone" placeholder="Phone">
            <label>Cars (Ctrl/Cmd+click to select multiple)</label>
            <select id="dealer-cars" multiple>
            </select>
            <div class="modal-actions">
                <button class="btn-add" onclick="submitDealer()">Save</button>
                <button class="btn-cancel" onclick="closeDealerModal()">Cancel</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="car-modal">
        <div class="modal">
            <h2 id="car-modal-title">Add Car</h2>
            <input type="hidden" id="car-edit-id">
            <input type="text" id="car-brand" placeholder="Brand">
            <input type="text" id="car-model" placeholder="Model">
            <input type="number" id="car-year" placeholder="Year">
            <input type="number" id="car-price" placeholder="Price" step="0.01">
            <label>Dealers (Ctrl/Cmd+click to select multiple)</label>
            <select id="car-dealers" multiple>
            </select>
            <div class="modal-actions">
                <button class="btn-add" id="car-submit-btn" onclick="submitCar()">Add</button>
                <button class="btn-cancel" onclick="closeCarModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let carsCache = [];
        let carSortField = 'id';
        let carSortDir = 'asc';

        const carNumericSortFields = new Set(['id', 'year', 'price', 'dealerCount']);

        function getSortedCars() {
            const m = carSortDir === 'asc' ? 1 : -1;
            const field = carSortField;
            return [...carsCache].sort((a, b) => {
                if (carNumericSortFields.has(field)) {
                    const va = Number(a[field]);
                    const vb = Number(b[field]);
                    if (va !== vb) return m * (va < vb ? -1 : 1);
                } else {
                    const va = String(a[field] ?? '');
                    const vb = String(b[field] ?? '');
                    const cmp = va.localeCompare(vb, undefined, { sensitivity: 'base' });
                    if (cmp !== 0) return m * cmp;
                }
                return a.id - b.id;
            });
        }

        function renderCarsTable(cars) {
            const tbody = document.getElementById('cars-table');
            tbody.innerHTML = cars.map(c => `
                <tr>
                    <td>${c.id}</td>
                    <td>${c.brand}</td>
                    <td>${c.model}</td>
                    <td>${c.year}</td>
                    <td>$${c.price.toLocaleString()}</td>
                    <td>${c.dealerCount}</td>
                    <td class="actions">
                        <button class="btn-edit" onclick='editCar(${JSON.stringify(c).replace(/'/g, "&#39;")})'>Edit</button>
                        <button class="btn-delete" onclick="deleteCar(${c.id})">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        function toggleCarSort(field) {
            if (carSortField === field)
                carSortDir = carSortDir === 'asc' ? 'desc' : 'asc';
            else {
                carSortField = field;
                carSortDir = 'asc';
            }
            renderCarsTable(getSortedCars());
            updateCarSortIndicators();
        }

        function updateCarSortIndicators() {
            document.querySelectorAll('#cars-thead .sort-ind').forEach(el => { el.textContent = ''; });
            const th = document.querySelector(`#cars-thead th.sortable[data-field="${carSortField}"]`);
            const ind = th?.querySelector('.sort-ind');
            if (ind) ind.textContent = carSortDir === 'asc' ? ' ▲' : ' ▼';
        }

        async function loadCars() {
            const res = await fetch('/api/admin/cars');
            carsCache = await res.json();
            renderCarsTable(getSortedCars());
            updateCarSortIndicators();
        }

        async function loadDealers() {
            const brand = document.getElementById('filter-brand').value.trim();
            const city = document.getElementById('filter-city').value.trim();
            const params = new URLSearchParams();
            if (brand) params.set('brand', brand);
            if (city) params.set('city', city);
            const res = await fetch(`/api/admin/dealers?${params}`);
            const dealers = await res.json();
            const tbody = document.getElementById('dealers-table');
            tbody.innerHTML = dealers.map(d => `
                <tr>
                    <td>${d.id}</td>
                    <td>${d.name}</td>
                    <td>${d.brand}</td>
                    <td>${d.city}</td>
                    <td>${d.phone}</td>
                    <td>${d.carCount}</td>
                    <td class="actions">
                        <button class="btn-edit" onclick='editDealer(${JSON.stringify(d).replace(/'/g, "&#39;")})'>Edit</button>
                        <button class="btn-delete" onclick="deleteDealer(${d.id})">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        async function loadDealerOptions(selectedIds) {
            const res = await fetch('/api/admin/dealers');
            const dealers = await res.json();
            const select = document.getElementById('car-dealers');
            select.innerHTML = dealers.map(d =>
                `<option value="${d.id}" ${selectedIds.includes(d.id) ? 'selected' : ''}>${d.name} (${d.city})</option>`
            ).join('');
        }

        async function openCarModal() {
            document.getElementById('car-edit-id').value = '';
            document.getElementById('car-modal-title').textContent = 'Add Car';
            document.getElementById('car-submit-btn').textContent = 'Add';
            document.getElementById('car-brand').value = '';
            document.getElementById('car-model').value = '';
            document.getElementById('car-year').value = '';
            document.getElementById('car-price').value = '';
            await loadDealerOptions([]);
            document.getElementById('car-modal').classList.add('active');
        }

        async function editCar(car) {
            document.getElementById('car-edit-id').value = car.id;
            document.getElementById('car-modal-title').textContent = 'Edit Car';
            document.getElementById('car-submit-btn').textContent = 'Save';
            document.getElementById('car-brand').value = car.brand;
            document.getElementById('car-model').value = car.model;
            document.getElementById('car-year').value = car.year;
            document.getElementById('car-price').value = car.price;
            await loadDealerOptions(car.dealerIds || []);
            document.getElementById('car-modal').classList.add('active');
        }

        function closeCarModal() {
            document.getElementById('car-modal').classList.remove('active');
        }

        async function submitCar() {
            const editId = document.getElementById('car-edit-id').value;
            const select = document.getElementById('car-dealers');
            const dealerIds = Array.from(select.selectedOptions).map(o => parseInt(o.value));
            const data = {
                brand: document.getElementById('car-brand').value.trim(),
                model: document.getElementById('car-model').value.trim(),
                year: parseInt(document.getElementById('car-year').value),
                price: parseFloat(document.getElementById('car-price').value),
                dealerIds
            };

            if (!data.brand || !data.model || !data.year || !data.price) {
                showStatus('Fill in all fields', 'error');
                return;
            }

            try {
                const url = editId ? `/api/admin/cars/${editId}` : '/api/admin/cars';
                const method = editId ? 'PUT' : 'POST';
                const res = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    showStatus(editId ? 'Car updated' : 'Car added', 'success');
                    closeCarModal();
                    loadCars();
                } else {
                    const err = await res.json().catch(() => null);
                    showStatus('Error: ' + (err?.message || res.statusText), 'error');
                }
            } catch (e) {
                showStatus(e.message || 'Connection error', 'error');
            }
        }

        async function deleteCar(id) {
            if (!confirm('Delete this car?')) return;
            const res = await fetch(`/api/admin/cars/${id}`, { method: 'DELETE' });
            if (res.ok) {
                showStatus('Car deleted', 'success');
                loadCars();
            } else {
                showStatus('Error deleting car', 'error');
            }
        }

        async function editDealer(dealer) {
            document.getElementById('dealer-edit-id').value = dealer.id;
            document.getElementById('dealer-name').value = dealer.name;
            document.getElementById('dealer-brand').value = dealer.brand;
            document.getElementById('dealer-city').value = dealer.city;
            document.getElementById('dealer-phone').value = dealer.phone;

            const res = await fetch('/api/admin/cars');
            const cars = await res.json();
            const select = document.getElementById('dealer-cars');
            const selectedIds = dealer.carIds || [];
            select.innerHTML = cars.map(c =>
                `<option value="${c.id}" ${selectedIds.includes(c.id) ? 'selected' : ''}>${c.brand} ${c.model} (${c.year})</option>`
            ).join('');

            document.getElementById('dealer-modal').classList.add('active');
        }

        function closeDealerModal() {
            document.getElementById('dealer-modal').classList.remove('active');
        }

        async function submitDealer() {
            const id = document.getElementById('dealer-edit-id').value;
            const select = document.getElementById('dealer-cars');
            const carIds = Array.from(select.selectedOptions).map(o => parseInt(o.value));
            const data = {
                name: document.getElementById('dealer-name').value.trim(),
                brand: document.getElementById('dealer-brand').value.trim(),
                city: document.getElementById('dealer-city').value.trim(),
                phone: document.getElementById('dealer-phone').value.trim(),
                carIds
            };

            if (!data.name || !data.brand || !data.city || !data.phone) {
                showStatus('Fill in all fields', 'error');
                return;
            }

            try {
                const res = await fetch(`/api/admin/dealers/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    showStatus('Dealer updated', 'success');
                    closeDealerModal();
                    loadDealers();
                    loadCars();
                } else {
                    const err = await res.json().catch(() => null);
                    showStatus('Error: ' + (err?.message || res.statusText), 'error');
                }
            } catch (e) {
                showStatus(e.message || 'Connection error', 'error');
            }
        }

        async function deleteDealer(id) {
            if (!confirm('Delete this dealer?')) return;
            const res = await fetch(`/api/admin/dealers/${id}`, { method: 'DELETE' });
            if (res.ok) {
                showStatus('Dealer deleted', 'success');
                loadDealers();
            } else {
                showStatus('Error deleting dealer', 'error');
            }
        }

        function showStatus(msg, type) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = `status ${type}`;
            setTimeout(() => el.className = 'status', 3000);
        }

        loadCars();
        loadDealers();
    </script>
</body>
</html>
