<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — Games API</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; padding: 20px; }
        h1 { margin-bottom: 20px; color: #fff; }
        h2 { margin: 20px 0 10px; color: #ccc; font-size: 1.1rem; }

        .form-section { background: #1a1a1a; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #333; }
        .form-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        input { background: #2a2a2a; border: 1px solid #444; color: #e0e0e0; padding: 8px 12px; border-radius: 4px; font-size: 14px; }
        input:focus { outline: none; border-color: #646cff; }
        input::placeholder { color: #666; }
        .form-row input { flex: 1; min-width: 150px; }

        button { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn-add { background: #22c55e; color: #000; font-weight: 600; }
        .btn-add:hover { background: #16a34a; }
        .btn-edit { background: #3b82f6; color: #fff; }
        .btn-edit:hover { background: #2563eb; }
        .btn-delete { background: #ef4444; color: #fff; }
        .btn-delete:hover { background: #dc2626; }
        .btn-cancel { background: #555; color: #fff; }

        table { width: 100%; border-collapse: collapse; background: #1a1a1a; border-radius: 8px; overflow: hidden; }
        th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #333; }
        th { background: #252525; color: #aaa; font-weight: 600; font-size: 13px; text-transform: uppercase; }
        td { font-size: 14px; }
        .actions { display: flex; gap: 6px; }

        .status { padding: 10px; border-radius: 4px; margin-bottom: 15px; display: none; }
        .status.success { display: block; background: #052e16; color: #4ade80; border: 1px solid #166534; }
        .status.error { display: block; background: #2c0b0e; color: #f87171; border: 1px solid #7f1d1d; }

        .upload-area { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 150px; }
        .upload-btn { background: #2a2a2a; border: 1px solid #444; color: #e0e0e0; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 14px; white-space: nowrap; }
        .upload-btn:hover { border-color: #646cff; }
        .upload-preview { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; display: none; border: 1px solid #444; }
        .upload-name { color: #888; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
        .game-thumb { width: 48px; height: 48px; border-radius: 4px; object-fit: cover; }
    </style>
</head>
<body>
    <h1>Games Admin Panel</h1>

    <div id="status" class="status"></div>

    <div class="form-section">
        <h2 id="form-title">Add New Game</h2>
        <input type="hidden" id="edit-id">
        <div class="form-row">
            <input type="text" id="name" placeholder="Game name" required>
            <input type="text" id="genre" placeholder="Genre" required>
            <input type="number" id="price" placeholder="Price" step="0.01" min="0">
        </div>
        <div class="form-row">
            <input type="text" id="description" placeholder="Description">
            <div class="upload-area">
                <input type="file" id="imageFile" accept="image/*" style="display:none" onchange="onFileSelected(this)">
                <label for="imageFile" class="upload-btn">Choose Image</label>
                <img id="upload-preview" class="upload-preview">
                <span id="upload-name" class="upload-name"></span>
            </div>
            <input type="hidden" id="imageUrl">
        </div>
        <div class="form-row">
            <button class="btn-add" id="submit-btn" onclick="submitForm()">Add</button>
            <button class="btn-cancel" id="cancel-btn" onclick="cancelEdit()" style="display:none;">Cancel</button>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Image</th>
                <th>Name</th>
                <th>Genre</th>
                <th>Description</th>
                <th>Price</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="games-table"></tbody>
    </table>

    <script>
        const API = '/api/admin/games';

        async function loadGames() {
            const res = await fetch('/api/games');
            const games = await res.json();
            const tbody = document.getElementById('games-table');
            tbody.innerHTML = games.map(g => `
                <tr>
                    <td>${g.id}</td>
                    <td>${g.imageUrl ? `<img src="${g.imageUrl}" class="game-thumb">` : '—'}</td>
                    <td>${g.name}</td>
                    <td>${g.genre}</td>
                    <td>${g.description || '—'}</td>
                    <td>${g.price > 0 ? '$' + g.price : 'Free'}</td>
                    <td class="actions">
                        <button class="btn-edit" onclick='startEdit(${JSON.stringify(g)})'>Edit</button>
                        <button class="btn-delete" onclick="deleteGame(${g.id})">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        function onFileSelected(input) {
            const file = input.files[0];
            const preview = document.getElementById('upload-preview');
            const nameEl = document.getElementById('upload-name');
            if (file) {
                preview.src = URL.createObjectURL(file);
                preview.style.display = 'block';
                nameEl.textContent = file.name;
            } else {
                preview.style.display = 'none';
                nameEl.textContent = '';
            }
        }

        async function uploadImage() {
            const fileInput = document.getElementById('imageFile');
            if (!fileInput.files.length) return null;

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            const res = await fetch('/api/admin/upload', { method: 'POST', body: formData });
            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.message || 'Image upload error');
            }
            const result = await res.json();
            return result.url;
        }

        async function submitForm() {
            const editId = document.getElementById('edit-id').value;

            if (!document.getElementById('name').value || !document.getElementById('genre').value) {
                showStatus('Name and genre are required', 'error');
                return;
            }

            try {
                // Upload image if file selected
                const uploadedUrl = await uploadImage();

                const data = {
                    name: document.getElementById('name').value,
                    genre: document.getElementById('genre').value,
                    description: document.getElementById('description').value,
                    price: parseFloat(document.getElementById('price').value) || 0,
                    imageUrl: uploadedUrl || document.getElementById('imageUrl').value
                };

                const isEdit = editId !== '';
                const res = await fetch(isEdit ? `${API}/${editId}` : API, {
                    method: isEdit ? 'PUT' : 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    showStatus(isEdit ? 'Game updated' : 'Game added', 'success');
                    clearForm();
                    loadGames();
                } else {
                    showStatus('Error: ' + res.statusText, 'error');
                }
            } catch (e) {
                showStatus(e.message || 'Connection error', 'error');
            }
        }

        async function deleteGame(id) {
            if (!confirm('Delete this game?')) return;

            const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
            if (res.ok) {
                showStatus('Game deleted', 'success');
                loadGames();
            }
        }

        function startEdit(game) {
            document.getElementById('edit-id').value = game.id;
            document.getElementById('name').value = game.name;
            document.getElementById('genre').value = game.genre;
            document.getElementById('description').value = game.description || '';
            document.getElementById('price').value = game.price;
            document.getElementById('imageUrl').value = game.imageUrl || '';
            document.getElementById('imageFile').value = '';
            const preview = document.getElementById('upload-preview');
            const nameEl = document.getElementById('upload-name');
            if (game.imageUrl) {
                preview.src = game.imageUrl;
                preview.style.display = 'block';
                nameEl.textContent = 'Current image';
            } else {
                preview.style.display = 'none';
                nameEl.textContent = '';
            }
            document.getElementById('form-title').textContent = `Editing: ${game.name}`;
            document.getElementById('submit-btn').textContent = 'Save';
            document.getElementById('submit-btn').className = 'btn-edit';
            document.getElementById('cancel-btn').style.display = 'inline-block';
        }

        function cancelEdit() {
            clearForm();
        }

        function clearForm() {
            document.getElementById('edit-id').value = '';
            document.getElementById('name').value = '';
            document.getElementById('genre').value = '';
            document.getElementById('description').value = '';
            document.getElementById('price').value = '';
            document.getElementById('imageUrl').value = '';
            document.getElementById('imageFile').value = '';
            document.getElementById('upload-preview').style.display = 'none';
            document.getElementById('upload-name').textContent = '';
            document.getElementById('form-title').textContent = 'Add New Game';
            document.getElementById('submit-btn').textContent = 'Add';
            document.getElementById('submit-btn').className = 'btn-add';
            document.getElementById('cancel-btn').style.display = 'none';
        }

        function showStatus(msg, type) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = `status ${type}`;
            setTimeout(() => el.className = 'status', 3000);
        }

        loadGames();
    </script>
</body>
</html>
