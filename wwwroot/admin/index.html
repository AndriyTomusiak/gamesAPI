<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" crossorigin="">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" crossorigin="">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; }
        h1 {
            padding: 16px 20px;
            font-size: 1.25rem;
            color: #fff;
            font-weight: 600;
            text-align: center;
        }
        #map {
            height: 380px;
            width: min(calc(100% - 40px), 720px);
            margin: 0 auto 24px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #333;
        }
        .leaflet-container { background: #1a1a1a; }
    </style>
</head>
<body>
    <h1>Карта</h1>
    <div id="map" role="application" aria-label="Інтерактивна карта"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" crossorigin=""></script>
    <script>
        async function initMap() {
            const res = await fetch('/api/map/pins');
            if (!res.ok) {
                document.getElementById('map').innerHTML =
                    '<p style="padding:24px;color:#f87171;">Не вдалося завантажити піни: ' + res.status + '</p>';
                return;
            }
            const pins = await res.json();
            if (!pins.length) return;

            const map = L.map('map').setView([pins[0].lat, pins[0].lng], 11);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
            }).addTo(map);

            const cluster = L.markerClusterGroup({ chunkedLoading: true });
            pins.forEach(p => {
                cluster.addLayer(L.marker([p.lat, p.lng]).bindPopup(String(p.title)));
            });
            map.addLayer(cluster);
            map.fitBounds(cluster.getBounds(), { padding: [48, 48] });
        }

        initMap();
    </script>
</body>
</html>
