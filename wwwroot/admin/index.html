<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — Games API</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; padding: 20px; }
        h1 { margin-bottom: 20px; color: #fff; }
        h2 { margin: 20px 0 10px; color: #ccc; font-size: 1.1rem; }

        .form-section { background: #1a1a1a; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #333; }
        .form-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        input, textarea { background: #2a2a2a; border: 1px solid #444; color: #e0e0e0; padding: 8px 12px; border-radius: 4px; font-size: 14px; font-family: inherit; }
        input:focus, textarea:focus { outline: none; border-color: #646cff; }
        input::placeholder, textarea::placeholder { color: #666; }
        .form-row input { flex: 1; min-width: 150px; }

        button { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn-edit { background: #3b82f6; color: #fff; }
        .btn-edit:hover { background: #2563eb; }
        .btn-delete { background: #ef4444; color: #fff; }
        .btn-delete:hover { background: #dc2626; }
        .btn-cancel { background: #555; color: #fff; }

        table { width: 100%; border-collapse: collapse; background: #1a1a1a; border-radius: 8px; overflow: hidden; }
        th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #333; }
        th { background: #252525; color: #aaa; font-weight: 600; font-size: 13px; text-transform: uppercase; }
        td { font-size: 14px; }
        .actions { display: flex; gap: 6px; }

        .status { padding: 10px; border-radius: 4px; margin-bottom: 15px; display: none; }
        .status.success { display: block; background: #052e16; color: #4ade80; border: 1px solid #166534; }
        .status.error { display: block; background: #2c0b0e; color: #f87171; border: 1px solid #7f1d1d; }

        .upload-area { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 150px; }
        .upload-btn { background: #2a2a2a; border: 1px solid #444; color: #e0e0e0; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 14px; white-space: nowrap; }
        .upload-btn:hover { border-color: #646cff; }
        .upload-preview { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; display: none; border: 1px solid #444; }
        .upload-name { color: #888; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
        .game-thumb { width: 48px; height: 48px; border-radius: 4px; object-fit: cover; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
        .badge-system { background: #854d0e; color: #fbbf24; }
        .config-editor { width: 100%; min-height: 200px; font-family: 'SF Mono', Monaco, monospace; font-size: 13px; resize: vertical; }
        .item-wrap { position: relative; display: inline-block; }
        .item-remove { position: absolute; top: -6px; right: -6px; width: 18px; height: 18px; background: #ef4444; color: #fff; border: none; border-radius: 50%; font-size: 12px; line-height: 18px; text-align: center; cursor: pointer; padding: 0; }
        .items-grid { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .item-slot { width: 60px; height: 60px; border: 2px dashed #444; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: visible; }
        .item-slot img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }
        .item-slot .slot-label { color: #555; font-size: 11px; }
    </style>
</head>
<body>
    <h1>Games Admin Panel</h1>

    <div id="status" class="status"></div>

    <div class="form-section" id="edit-form" style="display:none;">
        <h2 id="form-title">Edit Game</h2>
        <input type="hidden" id="edit-id">
        <div class="form-row">
            <input type="text" id="slug" placeholder="Slug (e.g. magicMemory)" required>
            <input type="text" id="genre" placeholder="Genre" required>
        </div>
        <div class="form-row">
            <input type="text" id="description" placeholder="Description">
            <div class="upload-area">
                <input type="file" id="imageFile" accept="image/*" style="display:none" onchange="onFileSelected(this)">
                <label for="imageFile" class="upload-btn">Choose Image</label>
                <img id="upload-preview" class="upload-preview">
                <span id="upload-name" class="upload-name"></span>
            </div>
            <input type="hidden" id="imageUrl">
        </div>
        <div id="config-section"></div>
        <div class="form-row" style="margin-top:10px;">
            <button class="btn-edit" id="submit-btn" onclick="submitForm()">Save</button>
            <button class="btn-cancel" id="cancel-btn" onclick="cancelEdit()">Cancel</button>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Slug</th>
                <th>Image</th>
                <th>Genre</th>
                <th>Description</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="games-table"></tbody>
    </table>

    <script>
        const API = '/api/admin/games';
        const ITEMS_COUNT = 8;
        let gamesCache = [];
        let currentSlug = '';
        // magicMemory config state
        let mmItems = []; // array of urls (length up to 8)
        let mmItemFiles = []; // array of File|null (pending uploads per slot)
        let mmCardBackUrl = '';
        let mmCardBackFile = null;

        async function loadGames() {
            const res = await fetch(API);
            gamesCache = await res.json();
            const tbody = document.getElementById('games-table');
            tbody.innerHTML = gamesCache.map(g => {
                const systemBadge = g.isSystem ? ' <span class="badge badge-system">system</span>' : '';
                const deleteBtn = g.isSystem ? '' : `<button class="btn-delete" onclick="deleteGame(${g.id})">Delete</button>`;
                return `
                <tr>
                    <td>${g.id}${systemBadge}</td>
                    <td>${g.slug || '—'}</td>
                    <td>${g.imageUrl ? `<img src="${g.imageUrl}" class="game-thumb">` : '—'}</td>
                    <td>${g.genre}</td>
                    <td>${g.description || '—'}</td>
                    <td class="actions">
                        <button class="btn-edit" onclick="startEditById(${g.id})">Edit</button>
                        ${deleteBtn}
                    </td>
                </tr>`;
            }).join('');
        }

        function startEditById(id) {
            const game = gamesCache.find(g => g.id === id);
            if (game) startEdit(game);
        }

        function onFileSelected(input) {
            const file = input.files[0];
            const preview = document.getElementById('upload-preview');
            const nameEl = document.getElementById('upload-name');
            if (file) {
                preview.src = URL.createObjectURL(file);
                preview.style.display = 'block';
                nameEl.textContent = file.name;
            } else {
                preview.style.display = 'none';
                nameEl.textContent = '';
            }
        }

        async function uploadSingleFile(file) {
            const formData = new FormData();
            formData.append('file', file);
            const res = await fetch('/api/admin/upload', { method: 'POST', body: formData });
            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.message || 'Image upload error');
            }
            const result = await res.json();
            return result.url;
        }

        async function uploadImage() {
            const fileInput = document.getElementById('imageFile');
            if (!fileInput.files.length) return null;
            return uploadSingleFile(fileInput.files[0]);
        }

        // --- Magic Memory config UI ---

        function renderMagicMemoryConfig(config) {
            const c = config || {};
            mmItems = Array.isArray(c.items) ? [...c.items] : [];
            mmItemFiles = new Array(ITEMS_COUNT).fill(null);
            mmCardBackUrl = c.cardBack || '';
            mmCardBackFile = null;

            const section = document.getElementById('config-section');
            section.innerHTML = `
                <h2 style="margin-top:10px;">Game Config — Magic Memory</h2>
                <div class="form-row">
                    <input type="text" id="cfg-title" placeholder="Game title" value="${c.title || ''}">
                    <input type="number" id="cfg-hints" placeholder="Hints count" min="0" value="${c.hints ?? 5}">
                </div>
                <div class="form-row">
                    <div class="upload-area">
                        <input type="file" id="cfg-cardback-file" accept="image/*" style="display:none" onchange="onCardBackPicked(this)">
                        <label for="cfg-cardback-file" class="upload-btn">Card Back Image</label>
                        <img id="cfg-cardback-preview" class="upload-preview" ${mmCardBackUrl ? `src="${mmCardBackUrl}" style="display:block;"` : ''}>
                        <span id="cfg-cardback-name" class="upload-name">${mmCardBackUrl ? 'Current' : ''}</span>
                    </div>
                </div>
                <h2 style="margin-top:10px;">Items (8 images)</h2>
                <div class="items-grid" id="cfg-items-grid"></div>
                <input type="file" id="cfg-item-file-input" accept="image/*" style="display:none">
            `;
            renderItemSlots();
        }

        function renderItemSlots() {
            const grid = document.getElementById('cfg-items-grid');
            grid.innerHTML = '';
            for (let i = 0; i < ITEMS_COUNT; i++) {
                const hasImage = mmItemFiles[i] || mmItems[i];
                const slot = document.createElement('div');
                slot.className = 'item-slot';
                if (hasImage) {
                    const src = mmItemFiles[i] ? URL.createObjectURL(mmItemFiles[i]) : mmItems[i];
                    slot.innerHTML = `<img src="${src}">`;
                    const btn = document.createElement('button');
                    btn.className = 'item-remove';
                    btn.textContent = '×';
                    btn.onclick = (e) => { e.stopPropagation(); removeItemSlot(i); };
                    slot.appendChild(btn);
                } else {
                    slot.innerHTML = '<span class="slot-label">' + (i + 1) + '</span>';
                }
                slot.onclick = () => pickItemFile(i);
                grid.appendChild(slot);
            }
        }

        function pickItemFile(index) {
            const input = document.getElementById('cfg-item-file-input');
            input.onchange = () => {
                if (input.files[0]) {
                    mmItemFiles[index] = input.files[0];
                    mmItems[index] = mmItems[index] || '__pending__';
                    renderItemSlots();
                }
                input.value = '';
            };
            input.click();
        }

        function removeItemSlot(index) {
            mmItems[index] = '';
            mmItemFiles[index] = null;
            renderItemSlots();
        }

        function onCardBackPicked(input) {
            const file = input.files[0];
            const preview = document.getElementById('cfg-cardback-preview');
            const nameEl = document.getElementById('cfg-cardback-name');
            if (file) {
                mmCardBackFile = file;
                preview.src = URL.createObjectURL(file);
                preview.style.display = 'block';
                nameEl.textContent = file.name;
            }
        }

        async function buildMagicMemoryConfig() {
            // Upload cardBack if new file
            if (mmCardBackFile) {
                mmCardBackUrl = await uploadSingleFile(mmCardBackFile);
            }

            // Upload items
            const finalItems = [];
            for (let i = 0; i < ITEMS_COUNT; i++) {
                if (mmItemFiles[i]) {
                    finalItems.push(await uploadSingleFile(mmItemFiles[i]));
                } else if (mmItems[i] && mmItems[i] !== '__pending__') {
                    finalItems.push(mmItems[i]);
                }
            }

            if (finalItems.length !== ITEMS_COUNT) {
                throw new Error(`Items: need exactly ${ITEMS_COUNT} images, got ${finalItems.length}`);
            }
            if (!mmCardBackUrl) {
                throw new Error('Card back image is required');
            }

            return {
                title: document.getElementById('cfg-title').value,
                hints: parseInt(document.getElementById('cfg-hints').value) || 0,
                cardBack: mmCardBackUrl,
                items: finalItems
            };
        }

        // --- Generic config (fallback for future games) ---

        function renderGenericConfig(config) {
            const section = document.getElementById('config-section');
            section.innerHTML = `
                <h2 style="margin-top:10px;">Game Config (JSON)</h2>
                <textarea id="cfg-json" class="config-editor" placeholder='{}'>${config ? JSON.stringify(config, null, 2) : ''}</textarea>
            `;
        }

        async function buildGenericConfig() {
            const text = document.getElementById('cfg-json').value.trim();
            if (!text) return null;
            return JSON.parse(text);
        }

        // --- Submit / Edit / Clear ---

        async function submitForm() {
            const editId = document.getElementById('edit-id').value;
            if (!editId) return;

            try {
                const uploadedUrl = await uploadImage();

                let configObj;
                if (currentSlug === 'magicMemory') {
                    configObj = await buildMagicMemoryConfig();
                } else {
                    configObj = await buildGenericConfig();
                }

                const data = {
                    slug: document.getElementById('slug').value,
                    genre: document.getElementById('genre').value,
                    description: document.getElementById('description').value,
                    imageUrl: uploadedUrl || document.getElementById('imageUrl').value,
                    config: configObj
                };

                const res = await fetch(`${API}/${editId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    showStatus('Game updated', 'success');
                    clearForm();
                    loadGames();
                } else {
                    const err = await res.json().catch(() => null);
                    showStatus('Error: ' + (err?.message || res.statusText), 'error');
                }
            } catch (e) {
                showStatus(e.message || 'Connection error', 'error');
            }
        }

        async function deleteGame(id) {
            if (!confirm('Delete this game?')) return;
            const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
            if (res.ok) {
                showStatus('Game deleted', 'success');
                loadGames();
            } else {
                const err = await res.json().catch(() => null);
                showStatus(err?.message || 'Error deleting game', 'error');
            }
        }

        function startEdit(game) {
            currentSlug = game.slug || '';
            document.getElementById('edit-id').value = game.id;
            document.getElementById('slug').value = game.slug || '';
            document.getElementById('genre').value = game.genre || '';
            document.getElementById('description').value = game.description || '';
            document.getElementById('imageUrl').value = game.imageUrl || '';
            document.getElementById('imageFile').value = '';
            const preview = document.getElementById('upload-preview');
            const nameEl = document.getElementById('upload-name');
            if (game.imageUrl) {
                preview.src = game.imageUrl;
                preview.style.display = 'block';
                nameEl.textContent = 'Current image';
            } else {
                preview.style.display = 'none';
                nameEl.textContent = '';
            }

            // Render config form based on slug
            if (game.slug === 'magicMemory') {
                renderMagicMemoryConfig(game.config);
            } else {
                renderGenericConfig(game.config);
            }

            document.getElementById('form-title').textContent = game.isSystem
                ? `Edit: ${game.slug} (system)`
                : `Edit: ${game.slug}`;
            document.getElementById('edit-form').style.display = 'block';
        }

        function cancelEdit() { clearForm(); }

        function clearForm() {
            currentSlug = '';
            document.getElementById('edit-id').value = '';
            document.getElementById('slug').value = '';
            document.getElementById('genre').value = '';
            document.getElementById('description').value = '';
            document.getElementById('imageUrl').value = '';
            document.getElementById('imageFile').value = '';
            document.getElementById('upload-preview').style.display = 'none';
            document.getElementById('upload-name').textContent = '';
            document.getElementById('config-section').innerHTML = '';
            document.getElementById('edit-form').style.display = 'none';
        }

        function showStatus(msg, type) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = `status ${type}`;
            setTimeout(() => el.className = 'status', 3000);
        }

        loadGames();
    </script>
</body>
</html>
